<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Tarefas Master - Prova</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <main class="container">
        <header>
            <h1>Minhas Tarefas</h1>
            <p>Organize suas prioridades e seja produtivo!</p>
        </header>

        <section class="task-app">
            <form id="task-form" class="task-form">
                <input type="text" id="new-task-input" placeholder="Digite uma nova tarefa..." required>
                <button type="submit" id="btn-add">Adicionar</button>
            </form>

            <div class="tasks-container">
                <ul id="lista-de-tarefas">
                    </ul>
            </div>
            
            <div class="stats">
                <p>Total de tarefas: <span id="task-count">0</span></p>
                <p>Tarefas concluídas: <span id="completed-count">0</span></p>
            </div>
        </section>
    </main>

    <div id="modal-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); justify-content:center; align-items:center; z-index:1000;">
        <div style="background:white; padding:20px; border-radius:15px; width:320px; display:flex; flex-direction:column; gap:10px; box-shadow: 0 5px 15px rgba(0,0,0,0.3);">
            <label style="color:#666; font-size:13px; font-weight: bold;">Edite a tarefa:</label>
            <input type="text" id="edit-input" style="background:white; border:1px solid #ccc; color:#333; padding:10px; border-radius:4px; width:100%; box-sizing:border-box; outline:none;">
            <div style="display:flex; justify-content:flex-end; gap:20px; margin-top:10px;">
                <button id="modal-cancel" style="background:none; border:none; color:#999; cursor:pointer; font-size:13px; font-weight:bold;">Cancelar</button>
                <button id="modal-ok" style="background:none; border:none; color:#999; cursor:pointer; font-size:13px; font-weight:bold;">OK</button>
            </div>
        </div>
    </div>
</body>
</html>
